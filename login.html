<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login</title>
<link rel="stylesheet" href="style.css">

</head>
<body>
<div class="login-box">
    <h2>Iniciar sesión</h2>
    <form id="loginForm">
        <label for="user">Usuario:</label>
        <input type="text" id="user" placeholder="Tu usuario" required>
        
        <label for="pass">Contraseña:</label>
        <input type="password" id="pass" placeholder="Tu contraseña" required>
        
        <button class="button" type="submit">Entrar</button>
        <p>¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a></p> 
    </form>
    <div id="loginMsg"></div>
</div>

<script>
document.getElementById('loginForm').onsubmit = async function(e){
    e.preventDefault();

    const usuario = document.getElementById('user').value.trim();
    const password = document.getElementById('pass').value;

    try {
        const res = await fetch('login.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ usuario, password })
        });
        const data = await res.json();

        if (data.success && data.user) {
            // Limpiamos cualquier basura previa
            localStorage.removeItem('user');
            // Guardamos el objeto de usuario como JSON
            localStorage.setItem('user', JSON.stringify(data.user));
            // Redirigimos al inicio
            window.location.href = 'index.html';
        } else {
            document.getElementById('loginMsg').innerText = data.msg || "Usuario o contraseña incorrectos.";
        }

    } catch (err) {
        console.error(err);
        document.getElementById('loginMsg').innerText = "Error de conexión con el servidor.";
    }
};
</script>
</body>
</html>
