<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login</title>
<link rel="stylesheet" href="style.css">
<style>
/* CSS original del login estilizado */
body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}
.login-box {
    background: #fff;
    padding: 40px 35px;
    border-radius: 12px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    text-align: center;
    width: 100%;
    max-width: 360px;
}
.login-box h2 {
    margin-bottom: 25px;
    color: #0072ff;
    font-size: 26px;
    font-weight: 700;
}
.login-box label {
    display: block;
    margin: 10px 0 5px;
    text-align: left;
    font-weight: 600;
    color: #444;
}
.login-box input {
    width: 100%;
    padding: 12px;
    border: 1.5px solid #ccc;
    border-radius: 8px;
    font-size: 14px;
    box-sizing: border-box;
    transition: border-color 0.3s ease;
}
.login-box input:focus {
    outline: none;
    border-color: #0072ff;
    box-shadow: 0 0 5px rgba(0,114,255,0.2);
}
.button {
    background: linear-gradient(90deg, #00c6ff, #0072ff);
    border: none;
    color: white;
    padding: 12px;
    width: 100%;
    border-radius: 8px;
    font-size: 16px;
    font-weight: bold;
    margin-top: 20px;
    cursor: pointer;
    transition: transform 0.2s ease, background 0.3s ease;
}
.button:hover {
    transform: translateY(-2px);
    background: linear-gradient(90deg, #0094e0, #0056b3);
}
.login-box p {
    margin-top: 20px;
    font-size: 14px;
    color: #555;
}
.login-box a {
    color: #0072ff;
    font-weight: 600;
    text-decoration: none;
}
.login-box a:hover {
    text-decoration: underline;
}
#loginMsg {
    margin-top: 15px;
    font-size: 14px;
    color: red;
    font-weight: bold;
}
</style>
</head>
<body>
<div class="login-box">
    <h2>Iniciar sesión</h2>
    <form id="loginForm">
        <label for="user">Usuario:</label>
        <input type="text" id="user" placeholder="Tu usuario" required>
        
        <label for="pass">Contraseña:</label>
        <input type="password" id="pass" placeholder="Tu contraseña" required>
        
        <button class="button" type="submit">Entrar</button>
        <p>¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a></p> 
    </form>
    <div id="loginMsg"></div>
</div>

<script>
document.getElementById('loginForm').onsubmit = async function(e){
    e.preventDefault();

    const usuario = document.getElementById('user').value.trim();
    const password = document.getElementById('pass').value;

    try {
        const res = await fetch('login.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ usuario, password })
        });
        const data = await res.json();

        if (data.success && data.user) {
            // Limpiamos cualquier basura previa
            localStorage.removeItem('user');
            // Guardamos el objeto de usuario como JSON
            localStorage.setItem('user', JSON.stringify(data.user));
            // Redirigimos al inicio
            window.location.href = 'index.html';
        } else {
            document.getElementById('loginMsg').innerText = data.msg || "Usuario o contraseña incorrectos.";
        }

    } catch (err) {
        console.error(err);
        document.getElementById('loginMsg').innerText = "Error de conexión con el servidor.";
    }
};
</script>
</body>
</html>
