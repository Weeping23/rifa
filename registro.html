<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro</title>
<link rel="stylesheet" href="style.css">

</head>
<body>
<div class="login-box">
    <h2>Registro de usuario</h2>
    <form id="registroForm" enctype="multipart/form-data">
        <label for="nombre">Nombres:</label>
        <input type="text" id="nombre" name="nombre" required>

        <label for="apellido">Apellidos:</label>
        <input type="text" id="apellido" name="apellido" required>

        <label for="usuario">Usuario:</label>
        <input type="text" id="usuario" name="usuario" required>

        <label for="correo">Correo:</label>
        <input type="email" id="correo" name="correo" required>

        <label for="password">Contraseña:</label>
        <input type="password" id="password" name="password" required>

        <label for="password2">Confirmar Contraseña:</label>
        <input type="password" id="password2" required>

        <label for="cedula">Cédula:</label>
        <input type="text" id="cedula" name="cedula" required>

        <label for="imagen">Imagen (opcional):</label>
        <input type="file" id="imagen" name="imagen" accept="image/*">

        <button class="button" type="submit">Registrarme</button>
    </form>
    <div id="msg"></div>
</div>

<script>
document.getElementById('registroForm').onsubmit = async function(e){
    e.preventDefault();

    const pass = document.getElementById('password').value;
    const pass2 = document.getElementById('password2').value;
    if(pass !== pass2){
        document.getElementById('msg').innerHTML = "<span style='color:red;'>Las contraseñas no coinciden.</span>";
        return;
    }

    const formData = new FormData(document.getElementById('registroForm'));
    try {
        const res = await fetch('registro.php', { method: 'POST', body: formData });
        const data = await res.json();
        if(data.success){
            document.getElementById('msg').innerHTML = "<span style='color:green;'>" + data.msg + "</span>";
            document.getElementById('registroForm').reset();
        } else {
            document.getElementById('msg').innerHTML = "<span style='color:red;'>" + data.msg + "</span>";
        }
    } catch (err) {
        document.getElementById('msg').innerHTML = "<span style='color:red;'>Error de conexión.</span>";
        console.error(err);
    }
};
</script>
</body>
</html>
