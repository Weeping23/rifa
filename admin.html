<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Admin Eventos</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ======= Reset & Base ======= */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", Roboto, sans-serif;
    }
    body {
      background: #f4f6f9;
      color: #333;
    }

    /* ======= Header ======= */
    header {
      background: #1f2937;
      padding: 15px 30px;
      box-shadow: 0 2px 6px rgba(0,0,0,.2);
    }
    nav {
      display: flex;
      gap: 20px;
    }
    nav a {
      color: #e5e7eb;
      text-decoration: none;
      font-weight: 500;
      transition: 0.3s;
      padding: 8px 14px;
      border-radius: 6px;
    }
    nav a:hover {
      background: #374151;
      color: #fff;
    }

    /* ======= Container ======= */
    .container {
      max-width: 900px;
      margin: 40px auto;
      background: #fff;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 4px 10px rgba(0,0,0,.08);
    }
    h2 {
      margin-bottom: 20px;
      font-size: 1.6rem;
      color: #111827;
    }

    /* ======= Form ======= */
    form {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr auto;
      gap: 15px;
      margin-bottom: 25px;
    }
    form input {
      padding: 10px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color .3s;
    }
    form input:focus {
      border-color: #2563eb;
    }
    .button {
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }
    .button:hover {
      background: #1e40af;
    }

    /* ======= Lista de eventos ======= */
    #eventosAdmin ul {
      list-style: none;
      margin-top: 15px;
    }
    #eventosAdmin li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #f9fafb;
      padding: 12px 16px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      margin-bottom: 10px;
    }
    #eventosAdmin li b {
      color: #111827;
    }
    #eventosAdmin button {
      background: #ef4444;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      transition: 0.3s;
    }
    #eventosAdmin button:hover {
      background: #b91c1c;
    }
  </style>
</head>
<body>
<header>
  <nav>
    <a href="index.html">Inicio</a>
    <a href="ventas.html">Histórico Ventas</a>
    <a href="usuarios.html">Usuarios</a>
    <a href="rates.html">Tarifas</a> <!-- 👈 añadido botón -->
  </nav>
</header>

<div class="container">
  <h2>Gestión de Eventos</h2>
  <form id="nuevoEvento">
    <input placeholder="Título" id="ntitulo" required>
    <input placeholder="Números disponibles" type="number" id="nmax" required>
    <input placeholder="Precio" id="nprecio" type="number" step="0.01" required>
    <button class="button" type="submit">Publicar evento</button>
  </form>
  <hr>
  <div id="eventosAdmin"></div>
</div>

<script src="utils.js"></script>
<script>
requireAdmin();

// Guardar evento nuevo
document.getElementById('nuevoEvento').onsubmit = function(e) {
  e.preventDefault();
  let titulo = document.getElementById('ntitulo').value;
  let stock = Number(document.getElementById('nmax').value);
  let precio = Number(document.getElementById('nprecio').value);

  fetch('guardarevento.php', {
    method: 'POST',
    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
    body: `titulo=${encodeURIComponent(titulo)}&stock=${stock}&precio=${precio}`
  })
  .then(res => res.json())
  .then(data => {
    if (data.status === "ok") {
      listarAdmin();
      document.getElementById('nuevoEvento').reset();
    } else {
      alert("Error al guardar: " + data.msg);
    }
  })
  .catch(err => console.error(err));
}

// Eliminar evento
window.removeEv = function(id) {
  if (!confirm("¿Eliminar este evento?")) return;
  fetch('eliminareventos.php', {
    method: 'POST',
    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
    body: `id=${id}`
  })
  .then(res => res.json())
  .then(data => {
    if (data.status === "ok") {
      listarAdmin();
    } else {
      alert("Error al eliminar: " + data.msg);
    }
  })
  .catch(err => console.error(err));
}

// Listar eventos
function listarAdmin() {
  fetch('listareventos.php')
  .then(res => res.json())
  .then(eventos => {
    let h = "<ul>";
    eventos.forEach(ev => {
      h += `<li>
        <span><b>${ev.titulo}</b> (${ev.stock} lugares), $${ev.precio}</span>
        <button onclick="removeEv(${ev.id})">Eliminar</button>
      </li>`;
    });
    h += "</ul>";
    document.getElementById('eventosAdmin').innerHTML = h;
  })
  .catch(err => console.error("Error al listar eventos:", err));
}
listarAdmin();
</script>
</body>
</html>
