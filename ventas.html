<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>Ventas Pendientes - Premium</title>

<!-- CSS Propio -->
<style>
/* --- TU MISMO CSS --- */
body{font-family:Arial,sans-serif;margin:0;padding:0;background-color:#f4f6f8;color:#333}
header nav{background-color:#007bff;padding:12px;text-align:center}
header nav a{color:#fff;font-weight:bold;text-decoration:none;margin:0 15px}
header nav a:hover{text-decoration:underline}
.container{max-width:1200px;margin:20px auto;padding:15px;background:#fff;border-radius:8px;box-shadow:0 2px 6px rgba(0,0,0,0.05)}
.table-wrapper{width:100%;overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:700px}
thead{background-color:#007bff;color:white}
th,td{border:1px solid #ddd;padding:10px;text-align:left;position:relative}
tbody tr:nth-child(even){background-color:#f9f9f9}
.btn-visualizar{background:#007bff;color:white;padding:6px 10px;border:none;border-radius:5px;cursor:pointer;transition:background-color 0.3s}
.btn-visualizar:hover{background:#0056b3}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);justify-content:center;align-items:center;z-index:9999;animation:fadeIn 0.3s ease forwards}
.modal-content{background:#fff;border-radius:10px;padding:10px;max-width:90%;max-height:90%;display:flex;flex-direction:column;align-items:center;animation:scaleIn 0.3s ease forwards;box-shadow:0 0 15px rgba(0,0,0,0.25);position:relative}
.modal-content img{max-width:100%;max-height:80vh;border-radius:8px;box-shadow:0 4px 15px rgba(0,0,0,0.4);user-select:none}
.modal-close{position:absolute;top:8px;right:8px;background:#ff4d4f;color:white;border:none;border-radius:50%;width:30px;height:30px;font-weight:bold;font-size:20px;cursor:pointer;line-height:28px;text-align:center;transition:background-color 0.3s;user-select:none;z-index:10}
.modal-close:hover{background:#cc0000}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{transform:scale(0.85)}to{transform:scale(1)}}
@media(max-width:768px){table{min-width:600px}th,td{padding:8px;font-size:0.85rem}}
#ventasTable {
  padding-top: 15px; /* Ajusta el valor según lo necesites */
}

</style>

<!-- jQuery + DataTables CSS/JS -->
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

</head>
<body>
<header>
<nav>
<a href="index.html">Inicio</a>
<a href="admin.html">Admin</a>
</nav>
</header>

<div class="container">
<h3>Histórico de Ventas</h3>
<div id="ventasCont" class="table-wrapper">
<table id="ventasTable" class="display">
<thead>
<tr>
<th>ID Venta</th><th>Nombre</th><th>Apellido</th><th>Usuario</th>
<th>Cantidad</th><th>Precio</th><th>Estado</th><th>Fecha</th>
<th>Boletos</th><th>Comprobante</th><th>Acción</th>
</tr>
</thead>
<tbody id="ventasBody">
<tr><td colspan="11" style="text-align:center;">Cargando...</td></tr>
</tbody>
</table>
</div>
</div>

<!-- Modal -->
<div id="modal" class="modal-overlay">
<div class="modal-content">
<button class="modal-close" onclick="cerrarModal()">×</button>
<img id="modalImg" alt="Comprobante de venta" />
</div>
</div>

<script>
// Escape HTML
const escapeHtml = str =>
  str ? str.replace(/[&<>"']/g, m => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[m])) : '';

// Modal
window.abrirModal = function(src) {
  document.getElementById('modalImg').src = src;
  document.getElementById('modal').style.display = 'flex';
};
window.cerrarModal = function() {
  document.getElementById('modal').style.display = 'none';
  document.getElementById('modalImg').src = '';
};
document.getElementById('modal').addEventListener('click', e=>{
  if(e.target.id==='modal') cerrarModal();
});

// Cargar ventas
async function cargarVentas(){
  try {
    const res = await fetch('ventas.php?action=list');
    if(!res.ok) throw new Error(`Error HTTP: ${res.status}`);
    const data = await res.json();
    if(data.Result!=='OK'){ mostrarError(data.Message||'Sin datos'); return; }
    renderVentas(data.Records);
  } catch(e){ mostrarError('Error cargando ventas'); console.error(e); }
}

// Render tabla
function renderVentas(ventas){
  const body = document.getElementById('ventasBody');
  if(!ventas.length){ mostrarError('No hay ventas registradas.'); return; }

  body.innerHTML = ventas.map(v=>{
    const detalle = (v.detalle||[]).map(d=>`${escapeHtml(d.titulo)}: ${d.nums.join(', ')}`).join('<br>');
    let btn = v.imagen
      ? `<button class="btn-visualizar" data-src="data:image/png;base64,${v.imagen}" onclick="abrirModal(this.dataset.src)">Visualizar</button>`
      : 'Sin imagen';
    const estados = ['Pendiente','Pagado','Cancelado'];
    const selectEstado = `<select onchange="cambiarEstado(${v.id},this.value)">` +
      estados.map(e=>`<option ${v.estado===e?'selected':''}>${e}</option>`).join('') +
      `</select>`;
    return `<tr>
      <td>${v.id}</td><td>${escapeHtml(v.nombre)}</td><td>${escapeHtml(v.apellido)}</td>
      <td>${escapeHtml(v.usuario)}</td><td>${v.cantidad}</td>
      <td>$${parseFloat(v.precio).toFixed(2)}</td>
      <td>${escapeHtml(v.estado)}</td><td>${v.fecha}</td><td>${detalle}</td>
      <td>${btn}</td><td>${selectEstado}</td>
    </tr>`;
  }).join('');

  // Inicializar DataTable al recargar datos
  if ($.fn.dataTable.isDataTable('#ventasTable')) {
    $('#ventasTable').DataTable().destroy();
  }
  $('#ventasTable').DataTable({
    pageLength: 10,
    order: [[0, 'desc']], // ordenar por ID desc
    columnDefs: [
    { orderable: false, targets: [8, 9, 10] }
    ],
    language: {
      url: "https://cdn.datatables.net/plug-ins/1.13.6/i18n/es-ES.json"
    }
  });
}

// Error msg
function mostrarError(msg){
  document.getElementById('ventasBody').innerHTML =
    `<tr><td colspan="11" style="text-align:center;color:red;">${escapeHtml(msg)}</td></tr>`;
}

// Cambiar estado placeholder
function cambiarEstado(id,estado){ 
  alert(`Cambiar estado de venta ${id} a ${estado} (Requiere backend)`); 
}

window.onload = cargarVentas;
</script>
</body>
</html>
